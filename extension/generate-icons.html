<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ContextPilot Icon Generator</title>
</head>
<body>
<h2>ContextPilot Icon Generator</h2>
<div id="previews"></div>
<script>
function generateIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  const radius = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(radius, 0);
  ctx.lineTo(size - radius, 0);
  ctx.quadraticCurveTo(size, 0, size, radius);
  ctx.lineTo(size, size - radius);
  ctx.quadraticCurveTo(size, size, size - radius, size);
  ctx.lineTo(radius, size);
  ctx.quadraticCurveTo(0, size, 0, size - radius);
  ctx.lineTo(0, radius);
  ctx.quadraticCurveTo(0, 0, radius, 0);
  ctx.closePath();

  const gradient = ctx.createLinearGradient(0, 0, size, size);
  gradient.addColorStop(0, '#1a1a2e');
  gradient.addColorStop(1, '#16213e');
  ctx.fillStyle = gradient;
  ctx.fill();

  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${Math.floor(size * 0.38)}px -apple-system, system-ui, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#2DD4BF';
  ctx.shadowBlur = size * 0.15;
  ctx.fillText('CP', size / 2, size / 2);

  return canvas;
}

[16, 48, 128].forEach(size => {
  const canvas = generateIcon(size);
  const container = document.createElement('div');
  container.style.cssText = 'display:inline-block; margin:20px; text-align:center;';
  const label = document.createElement('p');
  label.textContent = `icon${size}.png (${size}x${size})`;
  container.appendChild(label);
  container.appendChild(canvas);
  const btn = document.createElement('button');
  btn.textContent = `Download icon${size}.png`;
  btn.onclick = () => {
    const link = document.createElement('a');
    link.download = `icon${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  };
  container.appendChild(document.createElement('br'));
  container.appendChild(btn);
  document.getElementById('previews').appendChild(container);
});
</script>
</body>
</html>
